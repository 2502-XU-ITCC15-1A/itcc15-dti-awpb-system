services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: awpb-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-awpb_db}
      POSTGRES_USER: ${DB_USER:-awpb_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-awpb_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - awpb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-awpb_user} -d ${DB_NAME:-awpb_db}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API (Node.js/Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: awpb-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-awpb_db}
      DB_USER: ${DB_USER:-awpb_user}
      DB_PASSWORD: ${DB_PASSWORD:-awpb_password}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      GOOGLE_SHEETS_API_KEY: ${GOOGLE_SHEETS_API_KEY}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - awpb-network
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports
      - ./ssl:/app/ssl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: awpb-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_API_BASE_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - awpb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

  
volumes:
  postgres_data:
    driver: local

networks:
  awpb-network:
    driver: bridge`